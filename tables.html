<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Management - RestaurantPOS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <i class="fas fa-utensils"></i>
      <span>RestaurantPOS</span>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Main</div>
      <a href="dashboard.html" class="nav-item">
        <i class="fas fa-chart-line"></i>
        <span>Dashboard</span>
      </a>
      <a href="orders.html" class="nav-item">
        <i class="fas fa-shopping-cart"></i>
        <span>Orders / POS</span>
      </a>
      <a href="tables.html" class="nav-item active">
        <i class="fas fa-chair"></i>
        <span>Tables</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Management</div>
      <a href="menu.html" class="nav-item">
        <i class="fas fa-list"></i>
        <span>Menu</span>
      </a>
      <a href="inventory.html" class="nav-item">
        <i class="fas fa-box"></i>
        <span>Inventory</span>
      </a>
      <a href="customers.html" class="nav-item">
        <i class="fas fa-users"></i>
        <span>Customers</span>
      </a>
      <a href="staff.html" class="nav-item">
        <i class="fas fa-user-tie"></i>
        <span>Staff</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Analytics</div>
      <a href="reports.html" class="nav-item">
        <i class="fas fa-chart-bar"></i>
        <span>Reports</span>
      </a>
      <a href="expenses.html" class="nav-item">
        <i class="fas fa-receipt"></i>
        <span>Expenses</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Settings</div>
      <a href="settings.html" class="nav-item">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>
    </div>
  </div>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="toggle-sidebar">
          <i class="fas fa-bars"></i>
        </button>
        <h2 style="margin: 0; font-size: 1.3rem;">Table Management</h2>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle">
          <i class="fas fa-moon"></i>
        </button>
        <div class="user-profile">
          <div class="user-avatar">JM</div>
          <div>
            <div style="font-weight: 600; font-size: 0.95rem;">John Manager</div>
            <div style="font-size: 0.8rem; opacity: 0.8;">Admin</div>
          </div>
        </div>
        <a href="index.html" class="btn btn-outline btn-small">Logout</a>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Page Header -->
      <div class="page-header">
        <div class="page-title">
          <i class="fas fa-chair" style="color: var(--primary-red);"></i>
          <h1>Restaurant Floor Layout</h1>
        </div>
        <div>
          <span class="status-badge status-available" style="margin-right: 1rem;"><span class="status-dot"></span>Available</span>
          <span class="status-badge status-occupied" style="margin-right: 1rem;"><span class="status-dot"></span>Occupied</span>
          <span class="status-badge status-reserved"><span class="status-dot"></span>Reserved</span>
        </div>
      </div>

      <!-- Tables Grid -->
      <div class="grid grid-6" id="tables-grid" style="margin-top: 2rem;">
        <!-- Populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- Table Details Modal -->
  <div id="table-modal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h2 class="modal-title">Table Details</h2>
        <button class="modal-close" onclick="closeModal('table-modal')">✕</button>
      </div>
      <div class="modal-body">
        <!-- Content populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- Reservation Modal -->
  <div id="reservation-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Make Reservation</h2>
        <button class="modal-close" onclick="closeModal('reservation-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form>
          <div class="form-group">
            <label>Customer Name</label>
            <input type="text" placeholder="e.g., John Smith" required>
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+1 234 567 8901" required>
          </div>

          <div class="form-group">
            <label>Number of Guests</label>
            <input type="number" placeholder="4" min="1" required>
          </div>

          <div class="form-group">
            <label>Reservation Date</label>
            <input type="date" required>
          </div>

          <div class="form-group">
            <label>Reservation Time</label>
            <input type="time" required>
          </div>

          <div class="form-group">
            <label>Special Notes</label>
            <textarea placeholder="Birthday celebration, allergies, etc..." rows="3"></textarea>
          </div>

          <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary flex-1">Confirm Reservation</button>
            <button type="button" class="btn btn-secondary flex-1" onclick="closeModal('reservation-modal')">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
