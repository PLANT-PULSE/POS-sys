version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pos_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pos_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pos_network
    restart: always

  backend:
    build: .
    container_name: pos_backend
    ports:
      - '5000:5000'
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-pos_db}?schema=public
      - PORT=5000
      - NODE_ENV=development
      - JWT_SECRET=your_super_secret_jwt_key_here
      - JWT_EXPIRES_IN=1d
      - JWT_REFRESH_SECRET=your_super_secret_refresh_key_here
      - JWT_REFRESH_EXPIRES_IN=7d
    depends_on:
      - db
    networks:
      - pos_network
    # To run migrations before start, usually done via entrypoint script or CI/CD,
    # Here we just start the server. Migrations can be run manually from the container.
    restart: always

volumes:
  postgres_data:

networks:
  pos_network:
    driver: bridge
