<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant POS - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #c41e3a 0%, #a01730 100%); position: relative; overflow: hidden;">
    <!-- Animated background shapes -->
    <div style="position: absolute; width: 300px; height: 300px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; top: -100px; left: -100px; backdrop-filter: blur(10px);"></div>
    <div style="position: absolute; width: 200px; height: 200px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; bottom: -50px; right: -50px; backdrop-filter: blur(10px);"></div>

    <div style="position: relative; z-index: 10; width: 100%; max-width: 450px; padding: 2rem;">
      <!-- Login Card -->
      <div class="glass" style="padding: 3rem; border-radius: 20px;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
          <div style="font-size: 3.5rem; margin-bottom: 1rem;">🍽️</div>
          <h1 style="color: white; margin-bottom: 0.5rem;">RestaurantPOS</h1>
          <p style="color: rgba(255, 255, 255, 0.8); font-size: 0.95rem;">Professional Point of Sale System</p>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label style="color: white; font-weight: 600;">Email Address</label>
            <input type="email" placeholder="manager@restaurant.com" required style="background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2); color: white;">
          </div>

          <div class="form-group">
            <label style="color: white; font-weight: 600;">Password</label>
            <input type="password" placeholder="••••••••" required style="background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2); color: white;">
          </div>

          <div class="form-group">
            <label style="color: white; font-weight: 600;">Role</label>
            <select id="role-select" required style="background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2); color: white;">
              <option value="admin" style="color: #2c2c2c;">Admin</option>
              <option value="cashier" style="color: #2c2c2c;">Cashier</option>
              <option value="waiter" style="color: #2c2c2c;">Waiter</option>
              <option value="chef" style="color: #2c2c2c;">Chef</option>
            </select>
          </div>

          <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
            <input type="checkbox" id="remember" style="width: auto; height: auto; cursor: pointer;">
            <label for="remember" style="color: rgba(255, 255, 255, 0.8); margin: 0; cursor: pointer;">Remember me</label>
          </div>

          <button type="submit" class="btn btn-secondary w-full btn-large" style="background: var(--accent-gold); color: #2c2c2c; font-weight: 700; margin-bottom: 1rem;">
            <i class="fas fa-sign-in-alt"></i> Login
          </button>

          <p style="text-align: center; color: rgba(255, 255, 255, 0.7); font-size: 0.9rem;">Demo: Use any email & password</p>
        </form>

        <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.2);">
          <p style="color: rgba(255, 255, 255, 0.7); font-size: 0.85rem; text-align: center;">© 2024 RestaurantPOS. All rights reserved.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
