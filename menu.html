<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Management - RestaurantPOS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <i class="fas fa-utensils"></i>
      <span>RestaurantPOS</span>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Main</div>
      <a href="dashboard.html" class="nav-item">
        <i class="fas fa-chart-line"></i>
        <span>Dashboard</span>
      </a>
      <a href="orders.html" class="nav-item">
        <i class="fas fa-shopping-cart"></i>
        <span>Orders / POS</span>
      </a>
      <a href="tables.html" class="nav-item">
        <i class="fas fa-chair"></i>
        <span>Tables</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Management</div>
      <a href="menu.html" class="nav-item active">
        <i class="fas fa-list"></i>
        <span>Menu</span>
      </a>
      <a href="inventory.html" class="nav-item">
        <i class="fas fa-box"></i>
        <span>Inventory</span>
      </a>
      <a href="customers.html" class="nav-item">
        <i class="fas fa-users"></i>
        <span>Customers</span>
      </a>
      <a href="staff.html" class="nav-item">
        <i class="fas fa-user-tie"></i>
        <span>Staff</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Analytics</div>
      <a href="reports.html" class="nav-item">
        <i class="fas fa-chart-bar"></i>
        <span>Reports</span>
      </a>
      <a href="expenses.html" class="nav-item">
        <i class="fas fa-receipt"></i>
        <span>Expenses</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Settings</div>
      <a href="settings.html" class="nav-item">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>
    </div>
  </div>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="toggle-sidebar">
          <i class="fas fa-bars"></i>
        </button>
        <h2 style="margin: 0; font-size: 1.3rem;">Menu Management</h2>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle">
          <i class="fas fa-moon"></i>
        </button>
        <div class="user-profile">
          <div class="user-avatar">JM</div>
          <div>
            <div style="font-weight: 600; font-size: 0.95rem;">John Manager</div>
            <div style="font-size: 0.8rem; opacity: 0.8;">Admin</div>
          </div>
        </div>
        <a href="index.html" class="btn btn-outline btn-small">Logout</a>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Page Header -->
      <div class="page-header">
        <div class="page-title">
          <i class="fas fa-list" style="color: var(--primary-red);"></i>
          <h1>Menu Items</h1>
        </div>
        <button class="btn btn-primary" onclick="openModal('add-menu-modal')">
          <i class="fas fa-plus"></i> Add Item
        </button>
      </div>

      <!-- Search & Filter -->
      <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
        <div class="search-bar" style="flex: 1; max-width: 300px;">
          <i class="fas fa-search search-icon"></i>
          <input type="text" placeholder="Search menu items...">
        </div>
        <select style="padding: 0.75rem; border-radius: 8px; border: 2px solid var(--border-color);">
          <option>All Categories</option>
          <option>Fast Food</option>
          <option>Local Dishes</option>
          <option>Drinks</option>
          <option>Desserts</option>
        </select>
      </div>

      <!-- Menu Table -->
      <div class="card">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Image</th>
              <th>Item Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="menu-table">
            <!-- Populated by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add Menu Item Modal -->
  <div id="add-menu-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Add Menu Item</h2>
        <button class="modal-close" onclick="closeModal('add-menu-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="add-menu-form">
          <div class="form-group">
            <label>Item Name</label>
            <input type="text" placeholder="e.g., Margherita Pizza" required>
          </div>

          <div class="form-group">
            <label>Category</label>
            <select required>
              <option>Fast Food</option>
              <option>Local Dishes</option>
              <option>Drinks</option>
              <option>Desserts</option>
            </select>
          </div>

          <div class="form-group">
            <label>Price ($)</label>
            <input type="number" placeholder="12.99" required min="0" step="0.01">
          </div>

          <div class="form-group">
            <label>Image URL</label>
            <input type="url" placeholder="https://example.com/image.jpg" required>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea placeholder="Item description..." rows="3"></textarea>
          </div>

          <div class="form-group">
            <label>Availability</label>
            <select required>
              <option>Available</option>
              <option>Unavailable</option>
            </select>
          </div>

          <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary flex-1">Add Item</button>
            <button type="button" class="btn btn-secondary flex-1" onclick="closeModal('add-menu-modal')">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
