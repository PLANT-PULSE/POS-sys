<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Management - RestaurantPOS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <i class="fas fa-utensils"></i>
      <span>RestaurantPOS</span>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Main</div>
      <a href="dashboard.html" class="nav-item">
        <i class="fas fa-chart-line"></i>
        <span>Dashboard</span>
      </a>
      <a href="orders.html" class="nav-item">
        <i class="fas fa-shopping-cart"></i>
        <span>Orders / POS</span>
      </a>
      <a href="tables.html" class="nav-item">
        <i class="fas fa-chair"></i>
        <span>Tables</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Management</div>
      <a href="menu.html" class="nav-item">
        <i class="fas fa-list"></i>
        <span>Menu</span>
      </a>
      <a href="inventory.html" class="nav-item">
        <i class="fas fa-box"></i>
        <span>Inventory</span>
      </a>
      <a href="customers.html" class="nav-item">
        <i class="fas fa-users"></i>
        <span>Customers</span>
      </a>
      <a href="staff.html" class="nav-item active">
        <i class="fas fa-user-tie"></i>
        <span>Staff</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Analytics</div>
      <a href="reports.html" class="nav-item">
        <i class="fas fa-chart-bar"></i>
        <span>Reports</span>
      </a>
      <a href="expenses.html" class="nav-item">
        <i class="fas fa-receipt"></i>
        <span>Expenses</span>
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Settings</div>
      <a href="settings.html" class="nav-item">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>
    </div>
  </div>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="toggle-sidebar">
          <i class="fas fa-bars"></i>
        </button>
        <h2 style="margin: 0; font-size: 1.3rem;">Staff Management</h2>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle">
          <i class="fas fa-moon"></i>
        </button>
        <div class="user-profile">
          <div class="user-avatar">JM</div>
          <div>
            <div style="font-weight: 600; font-size: 0.95rem;">John Manager</div>
            <div style="font-size: 0.8rem; opacity: 0.8;">Admin</div>
          </div>
        </div>
        <a href="index.html" class="btn btn-outline btn-small">Logout</a>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Page Header -->
      <div class="page-header">
        <div class="page-title">
          <i class="fas fa-user-tie" style="color: var(--primary-red);"></i>
          <h1>Staff Members</h1>
        </div>
        <button class="btn btn-primary" onclick="openModal('add-staff-modal')">
          <i class="fas fa-plus"></i> Add Staff
        </button>
      </div>

      <!-- Staff Grid -->
      <div class="grid grid-3" id="staff-grid">
        <!-- Populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- Add Staff Modal -->
  <div id="add-staff-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Add Staff Member</h2>
        <button class="modal-close" onclick="closeModal('add-staff-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="add-staff-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="John Doe" required>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="john@restaurant.com" required>
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+1 234 567 8901" required>
          </div>

          <div class="form-group">
            <label>Role</label>
            <select required>
              <option>Admin</option>
              <option>Cashier</option>
              <option>Waiter</option>
              <option>Chef</option>
              <option>Assistant</option>
            </select>
          </div>

          <div class="form-group">
            <label>Shift</label>
            <select required>
              <option>Morning</option>
              <option>Afternoon</option>
              <option>Evening</option>
              <option>Night</option>
            </select>
          </div>

          <div class="form-group">
            <label>Salary ($)</label>
            <input type="number" placeholder="2500" min="0" required>
          </div>

          <div class="form-group">
            <label>Hire Date</label>
            <input type="date" required>
          </div>

          <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary flex-1">Add Staff</button>
            <button type="button" class="btn btn-secondary flex-1" onclick="closeModal('add-staff-modal')">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
